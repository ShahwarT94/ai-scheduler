AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "AI Scheduler \u2014 serverless backend (Lambda + API Gateway + DynamoDB)"
Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues:
    - dev
    - staging
    - prod
    Description: Deployment stage
  CoachId:
    Type: String
    Description: Unique identifier for the coach (e.g. "coach-001")
  TwilioAccountSid:
    Type: String
    NoEcho: true
    Description: "Twilio Account SID (starts with AC\u2026)"
  TwilioAuthToken:
    Type: String
    NoEcho: true
    Description: Twilio Auth Token
  TwilioPhoneNumber:
    Type: String
    Description: Twilio phone number in E.164 format (e.g. +14155551234)
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key for Claude
  WebhookUrl:
    Type: String
    Default: ''
    Description: "Full public URL for the Twilio SMS webhook. Leave blank on first\
      \ deploy \u2014 set after deploy using the WebhookUrl output.\n"
  FrontendOrigin:
    Type: String
    Default: '*'
    Description: Frontend origin for CORS (e.g. https://yourapp.cloudfront.net)
  SkipTwilioValidation:
    Type: String
    Default: 'false'
    AllowedValues:
    - 'true'
    - 'false'
    Description: Set to true to bypass Twilio signature validation (dev/testing only)
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 29
    MemorySize: 256
    Architectures:
    - arm64
    CodeUri: ./
    Environment:
      Variables:
        DYNAMODB_TABLE:
          Ref: DynamoTable
        COACH_ID:
          Ref: CoachId
        ANTHROPIC_API_KEY:
          Ref: AnthropicApiKey
        FRONTEND_ORIGIN:
          Ref: FrontendOrigin
Resources:
  DynamoTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName:
        Fn::Sub: ai-scheduler-${Stage}
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
      - AttributeName: PK
        AttributeType: S
      - AttributeName: SK
        AttributeType: S
      - AttributeName: GSI1PK
        AttributeType: S
      - AttributeName: GSI1SK
        AttributeType: S
      KeySchema:
      - AttributeName: PK
        KeyType: HASH
      - AttributeName: SK
        KeyType: RANGE
      GlobalSecondaryIndexes:
      - IndexName: GSI1
        KeySchema:
        - AttributeName: GSI1PK
          KeyType: HASH
        - AttributeName: GSI1SK
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
  ApiGateway:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName:
        Ref: Stage
      CorsConfiguration:
        AllowOrigins:
        - Ref: FrontendOrigin
        AllowHeaders:
        - Content-Type
        - Authorization
        - X-Twilio-Signature
        AllowMethods:
        - GET
        - POST
        - DELETE
        - OPTIONS
  CreateSlotsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: createSlots.handler
      Policies:
      - AmazonDynamoDBFullAccess
      - AWSLambdaBasicExecutionRole
      Description: "POST /coach/slots \u2014 generate hourly slots for a date range"
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: ApiGateway
            Method: POST
            Path: /coach/slots
      CodeUri: CreateSlotsFunction
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - functions/slots/createSlots.ts
        External:
        - '@aws-sdk/*'
        Format: cjs
        Minify: true
        Target: es2020
      SamResourceId: CreateSlotsFunction
  GetSlotsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: getSlots.handler
      Policies:
      - AmazonDynamoDBFullAccess
      - AWSLambdaBasicExecutionRole
      Description: "GET /coach/slots \u2014 fetch slots for a coach on a date"
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: ApiGateway
            Method: GET
            Path: /coach/slots
      CodeUri: GetSlotsFunction
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - functions/slots/getSlots.ts
        External:
        - '@aws-sdk/*'
        Format: cjs
        Minify: true
        Target: es2020
      SamResourceId: GetSlotsFunction
  GetBookingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: getBookings.handler
      Policies:
      - AmazonDynamoDBFullAccess
      - AWSLambdaBasicExecutionRole
      Description: "GET /coach/bookings \u2014 list bookings, optionally filtered\
        \ by date"
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: ApiGateway
            Method: GET
            Path: /coach/bookings
      CodeUri: GetBookingsFunction
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - functions/bookings/getBookings.ts
        External:
        - '@aws-sdk/*'
        Format: cjs
        Minify: true
        Target: es2020
      SamResourceId: GetBookingsFunction
  GetExceptionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: getExceptions.handler
      Policies:
      - AmazonDynamoDBFullAccess
      - AWSLambdaBasicExecutionRole
      Description: "GET /coach/exceptions \u2014 list exceptions by status"
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: ApiGateway
            Method: GET
            Path: /coach/exceptions
      CodeUri: GetExceptionsFunction
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - functions/exceptions/getExceptions.ts
        External:
        - '@aws-sdk/*'
        Format: cjs
        Minify: true
        Target: es2020
      SamResourceId: GetExceptionsFunction
  ResolveExceptionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: resolveException.handler
      Policies:
      - AmazonDynamoDBFullAccess
      - AWSLambdaBasicExecutionRole
      Description: "POST /coach/exceptions/{id}/resolve \u2014 book or dismiss an\
        \ exception"
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: ApiGateway
            Method: POST
            Path: /coach/exceptions/{id}/resolve
      CodeUri: ResolveExceptionFunction
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - functions/exceptions/resolveException.ts
        External:
        - '@aws-sdk/*'
        Format: cjs
        Minify: true
        Target: es2020
      SamResourceId: ResolveExceptionFunction
  SmsInboundFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: smsInbound.handler
      Policies:
      - AmazonDynamoDBFullAccess
      - AWSLambdaBasicExecutionRole
      Description: "POST /webhook/sms \u2014 Twilio webhook, AI parsing, auto-booking"
      MemorySize: 512
      Environment:
        Variables:
          TWILIO_ACCOUNT_SID:
            Ref: TwilioAccountSid
          TWILIO_AUTH_TOKEN:
            Ref: TwilioAuthToken
          TWILIO_PHONE_NUMBER:
            Ref: TwilioPhoneNumber
          WEBHOOK_URL:
            Ref: WebhookUrl
          SKIP_TWILIO_VALIDATION:
            Ref: SkipTwilioValidation
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: ApiGateway
            Method: POST
            Path: /webhook/sms
      CodeUri: SmsInboundFunction
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
        - functions/webhook/smsInbound.ts
        External:
        - '@aws-sdk/*'
        Format: cjs
        Minify: true
        Target: es2020
      SamResourceId: SmsInboundFunction
Outputs:
  ApiUrl:
    Description: "API Gateway base URL \u2014 set as NEXT_PUBLIC_API_URL in the frontend"
    Value:
      Fn::Sub: https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
  WebhookUrl:
    Description: "Twilio webhook URL \u2014 paste this into the Twilio console"
    Value:
      Fn::Sub: https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/webhook/sms
  DynamoTableName:
    Description: DynamoDB table name
    Value:
      Ref: DynamoTable
  DynamoTableArn:
    Description: DynamoDB table ARN
    Value:
      Fn::GetAtt:
      - DynamoTable
      - Arn
