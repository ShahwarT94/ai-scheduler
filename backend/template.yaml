AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: AI Scheduler — serverless backend (Lambda + API Gateway + DynamoDB)

# ─── Parameters ───────────────────────────────────────────────────────────────

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: Deployment stage

  CoachId:
    Type: String
    Description: Unique identifier for the coach (e.g. "coach-001")

  TwilioAccountSid:
    Type: String
    NoEcho: true
    Description: Twilio Account SID (starts with AC…)

  TwilioAuthToken:
    Type: String
    NoEcho: true
    Description: Twilio Auth Token

  TwilioPhoneNumber:
    Type: String
    Description: "Twilio phone number in E.164 format (e.g. +14155551234)"

  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key for Claude

  WebhookUrl:
    Type: String
    Default: ""
    Description: >
      Full public URL for the Twilio SMS webhook.
      Leave blank on first deploy — set after deploy using the WebhookUrl output.

  FrontendOrigin:
    Type: String
    Default: "*"
    Description: "Frontend origin for CORS (e.g. https://yourapp.cloudfront.net)"

  SkipTwilioValidation:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: "Set to true to bypass Twilio signature validation (dev/testing only)"

# ─── Globals ──────────────────────────────────────────────────────────────────
# Applied to every AWS::Serverless::Function unless overridden.

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 29               # 1s under API Gateway's 30s hard limit
    MemorySize: 256
    Architectures: [arm64]   # Graviton2 — ~20% cheaper, same performance
    CodeUri: ./               # SAM resolves this relative to template.yaml
    Environment:
      Variables:
        DYNAMODB_TABLE: !Ref DynamoTable
        COACH_ID: !Ref CoachId
        ANTHROPIC_API_KEY: !Ref AnthropicApiKey
        FRONTEND_ORIGIN: !Ref FrontendOrigin
    

# ─── Resources ────────────────────────────────────────────────────────────────

Resources:

  # ── DynamoDB ─────────────────────────────────────────────────────────────────

  DynamoTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain        # Never delete data on stack teardown
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "ai-scheduler-${Stage}"
      BillingMode: PAY_PER_REQUEST  # No capacity planning needed
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: PK,     AttributeType: S }
        - { AttributeName: SK,     AttributeType: S }
        - { AttributeName: GSI1PK, AttributeType: S }
        - { AttributeName: GSI1SK, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - { AttributeName: GSI1PK, KeyType: HASH }
            - { AttributeName: GSI1SK, KeyType: RANGE }
          Projection:
            ProjectionType: ALL

  # ── API Gateway (HTTP API) ────────────────────────────────────────────────────
  # HTTP API is ~70% cheaper than REST API and lower latency.

  ApiGateway:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage
      CorsConfiguration:
        AllowOrigins:
          - !Ref FrontendOrigin
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-Twilio-Signature
        AllowMethods:
          - GET
          - POST
          - DELETE
          - OPTIONS

  # ── Slots ─────────────────────────────────────────────────────────────────────

  CreateSlotsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/slots/createSlots.handler
      Policies:
        - AmazonDynamoDBFullAccess
        - AWSLambdaBasicExecutionRole
      Description: POST /coach/slots — generate hourly slots for a date range
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref ApiGateway
            Method: POST
            Path: /coach/slots
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Format: cjs
        EntryPoints:
          - functions/slots/createSlots.ts
        External:
          - "@aws-sdk/*"   # Available in Node 20 Lambda runtime

  GetSlotsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/slots/getSlots.handler
      Policies:
        - AmazonDynamoDBFullAccess
        - AWSLambdaBasicExecutionRole
      Description: GET /coach/slots — fetch slots for a coach on a date
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref ApiGateway
            Method: GET
            Path: /coach/slots
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Format: cjs
        EntryPoints:
          - functions/slots/getSlots.ts
        External:
          - "@aws-sdk/*"

  # ── Bookings ──────────────────────────────────────────────────────────────────

  GetBookingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/bookings/getBookings.handler
      Policies:
        - AmazonDynamoDBFullAccess
        - AWSLambdaBasicExecutionRole
      Description: GET /coach/bookings — list bookings, optionally filtered by date
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref ApiGateway
            Method: GET
            Path: /coach/bookings
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Format: cjs
        EntryPoints:
          - functions/bookings/getBookings.ts
        External:
          - "@aws-sdk/*"

  # ── Exceptions ────────────────────────────────────────────────────────────────

  GetExceptionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/exceptions/getExceptions.handler
      Policies:
        - AmazonDynamoDBFullAccess
        - AWSLambdaBasicExecutionRole
      Description: GET /coach/exceptions — list exceptions by status
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref ApiGateway
            Method: GET
            Path: /coach/exceptions
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Format: cjs
        EntryPoints:
          - functions/exceptions/getExceptions.ts
        External:
          - "@aws-sdk/*"

  ResolveExceptionFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/exceptions/resolveException.handler
      Policies:
        - AmazonDynamoDBFullAccess
        - AWSLambdaBasicExecutionRole
      Description: POST /coach/exceptions/{id}/resolve — book or dismiss an exception
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref ApiGateway
            Method: POST
            Path: /coach/exceptions/{id}/resolve
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Format: cjs
        EntryPoints:
          - functions/exceptions/resolveException.ts
        External:
          - "@aws-sdk/*"

  # ── Twilio Webhook ────────────────────────────────────────────────────────────
  # Needs more memory for the AI call + Twilio SDK.
  # Twilio + Anthropic credentials injected here only (not in Globals).

  SmsInboundFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: functions/webhook/smsInbound.handler
      Policies:
        - AmazonDynamoDBFullAccess
        - AWSLambdaBasicExecutionRole
      Description: POST /webhook/sms — Twilio webhook, AI parsing, auto-booking
      MemorySize: 512
      Environment:
        Variables:
          TWILIO_ACCOUNT_SID: !Ref TwilioAccountSid
          TWILIO_AUTH_TOKEN: !Ref TwilioAuthToken
          TWILIO_PHONE_NUMBER: !Ref TwilioPhoneNumber
          WEBHOOK_URL: !Ref WebhookUrl
          SKIP_TWILIO_VALIDATION: !Ref SkipTwilioValidation
      Events:
        Api:
          Type: HttpApi
          Properties:
            ApiId: !Ref ApiGateway
            Method: POST
            Path: /webhook/sms
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: es2020
        Format: cjs
        EntryPoints:
          - functions/webhook/smsInbound.ts
        External:
          - "@aws-sdk/*"
          # twilio and @anthropic-ai/sdk are NOT excluded — bundled into the zip

# ─── Outputs ──────────────────────────────────────────────────────────────────

Outputs:
  ApiUrl:
    Description: API Gateway base URL — set as NEXT_PUBLIC_API_URL in the frontend
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"

  WebhookUrl:
    Description: Twilio webhook URL — paste this into the Twilio console
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/webhook/sms"

  DynamoTableName:
    Description: DynamoDB table name
    Value: !Ref DynamoTable

  DynamoTableArn:
    Description: DynamoDB table ARN
    Value: !GetAtt DynamoTable.Arn
